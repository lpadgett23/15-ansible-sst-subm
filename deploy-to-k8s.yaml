---
- name: Deploy app in new namespace
  hosts: localhost
  tasks: 
    - name: Create a k8s namespace
      kubernetes.core.k8s:
        name: my-app
        api_version: v1
        kind: Namespace
        state: present
        # kubeconfig: /home/laura/twnsubs/15-ansible-sst-subm/terraform-eks-demos/kubeconfig_myapp-eks-cluster
    - name: Deploy nginx app
      kubernetes.core.k8s:
        src: /home/laura/twnsubs/15-ansible-sst-subm/nginx-config.yaml
        state: present
        # kubeconfig: /home/laura/twnsubs/15-ansible-sst-subm/terraform-eks-demos/kubeconfig_myapp-eks-cluster  # so that it knows what context to execute the src in
        namespace: my-app
        